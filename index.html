<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申込状況の確認｜大阪府歯科医師会</title>
<style>
  :root{
    --bg-page:#f5f6f8; --bg-primary:#ffffff; --bg-secondary:#eef0f4; --bg-tertiary:#e3e6ec;
    --bg-info:#e6f1fb; --bg-success:#e1f5ee; --bg-danger:#fcebeb; --bg-warning:#faeeda;
    --text-primary:#1b1e23; --text-secondary:#5c636e; --text-tertiary:#8d94a0;
    --text-info:#185fa5; --text-success:#0f6e56; --text-danger:#a32d2d; --text-warning:#854f0b;
    --border:rgba(20,24,31,0.10); --border2:rgba(20,24,31,0.18);
    --r-md:8px; --r-lg:12px; --accent:#2563eb; --accent-soft:#e8f0fe;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg-page); font-family:-apple-system,"Hiragino Sans","Meiryo",sans-serif; color:var(--text-primary); -webkit-font-smoothing:antialiased;}
  .wrap{max-width:400px; margin:0 auto; padding:16px;}
  .frame{background:var(--bg-secondary); border-radius:var(--r-lg); padding:14px;}
  .screen{background:var(--bg-primary); border-radius:var(--r-lg); border:0.5px solid var(--border); overflow:hidden;}
  .head{background:var(--bg-tertiary); padding:16px 18px; border-bottom:0.5px solid var(--border);}
  .head p{margin:0;}
  .body{padding:18px;}
  input{width:100%; height:44px; padding:0 12px; font-size:16px; border:0.5px solid var(--border2); border-radius:var(--r-md); outline:none; font-family:inherit;}
  input:focus{border-color:var(--text-info); box-shadow:0 0 0 3px var(--bg-info);}
  .fieldwrap{position:relative;}
  .fieldwrap .ficon{position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--text-tertiary); display:flex; pointer-events:none; transition:color .15s;}
  .fieldwrap:focus-within .ficon{color:var(--accent);}
  .fieldwrap input{padding-left:46px; height:54px; border-radius:14px; background:var(--bg-secondary); border:1px solid transparent;}
  .fieldwrap input:focus{background:var(--bg-primary); border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-soft);}
  .switcher{display:flex; flex-wrap:wrap; gap:6px; padding:8px 4px 2px;}
  .switcher button{font-size:11px; padding:6px 10px; border:0.5px solid var(--border); border-radius:var(--r-md); background:var(--bg-primary); color:var(--text-secondary); cursor:pointer;}
  .switcher button:hover{background:var(--bg-secondary);}
  .note{margin:12px 4px 2px; font-size:11px; color:var(--text-tertiary); line-height:1.6;}
  a{color:var(--text-info);}
  ul{margin:0; padding-left:18px;}
  .err{margin:4px 2px 0; font-size:12px; line-height:1.5; color:var(--text-danger); display:none;}
  @keyframes popIn{0%{transform:scale(.6);opacity:0;}60%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .confirmed-card{animation:fadeUp .4s ease both;}
  .confirmed-badge{animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;}
  @keyframes nudgeDown{0%,100%{transform:translateY(0);}50%{transform:translateY(3px);}}
  .bounce-down{display:inline-block; animation:nudgeDown 1.4s ease-in-out infinite;}
  @keyframes csspin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="wrap">
  <div class="frame">
    <div class="screen">
      <div class="head">
        <p style="font-size:15px; font-weight:500;">口腔機能実地指導料 研修会</p>
        <p style="margin-top:2px; font-size:13px; color:var(--text-secondary);">お申込み状況の確認</p>
      </div>
      <div class="body" id="body"></div>
    </div>
  </div>
</div>

<script>

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate
      title = (typeof title === 'string') ? {text: title} : title || {};
      title.text = title.text || null;
      title.id = (title.text) ? title.id || 'qrcode-title' : null;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var c, mc, r, mr, qrSvg='', rect;

      rect = 'l' + cellSize + ',0 0,' + cellSize +
        ' -' + cellSize + ',0 0,-' + cellSize + 'z ';

      qrSvg += '<svg version="1.1" xmlns="http://www.w3.org/2000/svg"';
      qrSvg += !opts.scalable ? ' width="' + size + 'px" height="' + size + 'px"' : '';
      qrSvg += ' viewBox="0 0 ' + size + ' ' + size + '" ';
      qrSvg += ' preserveAspectRatio="xMinYMin meet"';
      qrSvg += (title.text || alt.text) ? ' role="img" aria-labelledby="' +
          escapeXml([title.id, alt.id].join(' ').trim() ) + '"' : '';
      qrSvg += '>';
      qrSvg += (title.text) ? '<title id="' + escapeXml(title.id) + '">' +
          escapeXml(title.text) + '</title>' : '';
      qrSvg += (alt.text) ? '<description id="' + escapeXml(alt.id) + '">' +
          escapeXml(alt.text) + '</description>' : '';
      qrSvg += '<rect width="100%" height="100%" fill="white" cx="0" cy="0"/>';
      qrSvg += '<path d="';

      for (r = 0; r < _this.getModuleCount(); r += 1) {
        mr = r * cellSize + margin;
        for (c = 0; c < _this.getModuleCount(); c += 1) {
          if (_this.isDark(r, c) ) {
            mc = c*cellSize+margin;
            qrSvg += 'M' + mc + ',' + mr + rect;
          }
        }
      }

      qrSvg += '" stroke="transparent" fill="black"/>';
      qrSvg += '</svg>';

      return qrSvg;
    };

    _this.createDataURL = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      return createDataURL(size, size, function(x, y) {
        if (min <= x && x < max && min <= y && y < max) {
          var c = Math.floor( (x - min) / cellSize);
          var r = Math.floor( (y - min) / cellSize);
          return _this.isDark(r, c)? 0 : 1;
        } else {
          return 1;
        }
      } );
    };

    _this.createImgTag = function(cellSize, margin, alt) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;

      var img = '';
      img += '<img';
      img += '\u0020src="';
      img += _this.createDataURL(cellSize, margin);
      img += '"';
      img += '\u0020width="';
      img += size;
      img += '"';
      img += '\u0020height="';
      img += size;
      img += '"';
      if (alt) {
        img += '\u0020alt="';
        img += escapeXml(alt);
        img += '"';
      }
      img += '/>';

      return img;
    };

    var escapeXml = function(s) {
      var escaped = '';
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charAt(i);
        switch(c) {
        case '<': escaped += '&lt;'; break;
        case '>': escaped += '&gt;'; break;
        case '&': escaped += '&amp;'; break;
        case '"': escaped += '&quot;'; break;
        default : escaped += c; break;
        }
      }
      return escaped;
    };

    var _createHalfASCII = function(margin) {
      var cellSize = 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r1, r2, p;

      var blocks = {
        '██': '█',
        '█ ': '▀',
        ' █': '▄',
        '  ': ' '
      };

      var blocksLastLineNoMargin = {
        '██': '▀',
        '█ ': '▀',
        ' █': ' ',
        '  ': ' '
      };

      var ascii = '';
      for (y = 0; y < size; y += 2) {
        r1 = Math.floor((y - min) / cellSize);
        r2 = Math.floor((y + 1 - min) / cellSize);
        for (x = 0; x < size; x += 1) {
          p = '█';

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r1, Math.floor((x - min) / cellSize))) {
            p = ' ';
          }

          if (min <= x && x < max && min <= y+1 && y+1 < max && _this.isDark(r2, Math.floor((x - min) / cellSize))) {
            p += ' ';
          }
          else {
            p += '█';
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          ascii += (margin < 1 && y+1 >= max) ? blocksLastLineNoMargin[p] : blocks[p];
        }

        ascii += '\n';
      }

      if (size % 2 && margin > 0) {
        return ascii.substring(0, ascii.length - size - 1) + Array(size+1).join('▀');
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.createASCII = function(cellSize, margin) {
      cellSize = cellSize || 1;

      if (cellSize < 2) {
        return _createHalfASCII(margin);
      }

      cellSize -= 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r, p;

      var white = Array(cellSize+1).join('██');
      var black = Array(cellSize+1).join('  ');

      var ascii = '';
      var line = '';
      for (y = 0; y < size; y += 1) {
        r = Math.floor( (y - min) / cellSize);
        line = '';

  function csJsonp(action,params,onOk,onErr){
    var name="cb_"+Date.now()+"_"+Math.floor(Math.random()*1e6);
    var s=document.createElement("script");
    var done=false;
    var timer=setTimeout(function(){ if(done)return; done=true; cleanup(); if(onErr)onErr(); },12000);
    function cleanup(){ try{delete window[name];}catch(e){window[name]=undefined;} if(s&&s.parentNode)s.parentNode.removeChild(s); clearTimeout(timer); }
    window[name]=function(res){ if(done)return; done=true; cleanup(); if(onOk)onOk(res); };
    var q="action="+encodeURIComponent(action)+"&callback="+name;
    for(var k in params){ if(params.hasOwnProperty(k)) q+="&"+k+"="+encodeURIComponent(params[k]); }
    s.src=GAS_API_URL+(GAS_API_URL.indexOf("?")<0?"?":"&")+q;
    s.onerror=function(){ if(done)return; done=true; cleanup(); if(onErr)onErr(); };
    document.body.appendChild(s);
  }

    }
    if(state!=="notfound" && state!=="input" && state!=="comingsoon"){
      html+='<button onclick="window.__go(\'input\')" style="width:100%; height:42px; margin-top:16px; background:transparent; border:0.5px solid var(--border); border-radius:var(--r-md); font-size:13px; color:var(--text-secondary); cursor:pointer;">別の番号で確認する</button>';
    }
    b.innerHTML=html; window.scrollTo(0,0);
  }
  window.__go=render;
  window.__gcalUrl=function(){
    return "https://calendar.google.com/calendar/render?action=TEMPLATE"
      +"&text="+encodeURIComponent(REMINDER_TITLE)
      +"&dates="+PUBLISH_ICS_START+"/"+PUBLISH_ICS_END
      +"&details="+encodeURIComponent("確認サイト："+CONFIRM_URL);
  };
  window.__remDone=function(msg){ var el=document.getElementById("rem_done"); if(el){ el.textContent=msg; el.style.display="block"; } };
  window.__addReminder=function(){
    if(/iPad|iPhone|iPod/.test(navigator.userAgent)){ window.__icsReminder(); }
    else { window.open(window.__gcalUrl(),"_blank"); window.__remDone("カレンダーの登録画面を開きました。"); }
  };
  window.__icsReminder=function(){
    var ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//oda//confirm//JA","CALSCALE:GREGORIAN",
      "BEGIN:VEVENT","UID:"+Date.now()+"@oda.or.jp","DTSTAMP:20260618T000000Z",
      "DTSTART;VALUE=DATE:"+PUBLISH_ICS_START,"DTEND;VALUE=DATE:"+PUBLISH_ICS_END,
      "SUMMARY:"+REMINDER_TITLE,"DESCRIPTION:確認サイト："+CONFIRM_URL,
      "BEGIN:VALARM","TRIGGER:PT0S","ACTION:DISPLAY","DESCRIPTION:確認サイトを見る","END:VALARM",
      "END:VEVENT","END:VCALENDAR"].join("\r\n");
    var blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
    var a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="reminder.ics";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    window.__remDone("カレンダー用ファイル（.ics）をダウンロードしました。開くと登録できます。");
  };
  window.__lineShare=function(){
    var msg="【大阪府歯科医師会】研修会の申込状況の確認はこちら（公開日以降にご覧いただけます）：\n"+CONFIRM_URL;
    window.open("https://line.me/R/msg/text/?"+encodeURIComponent(msg),"_blank");
  };
  window.__toggleBM=function(){
    var el=document.getElementById("bm_help"); if(!el) return;
    if(el.style.display==="none"){ el.innerHTML=bmSteps(); el.style.display="block"; } else { el.style.display="none"; }
  };
  window.__copyUrl=function(){
    var done=document.getElementById("copy_done");
    try{ navigator.clipboard.writeText(CONFIRM_URL).then(function(){ if(done) done.style.display="block"; },function(){ if(done) done.style.display="block"; }); }
    catch(e){ if(done) done.style.display="block"; }
  };
  window.__confirm=function(){ confirmed=true; render(lastCompleted); try{ csJsonp("confirm",{phone:lastTel,dob:lastDob,preview:PREVIEW}); }catch(e){} };

  var PREVIEW=(function(){try{var m=location.search.match(/[?&]preview=([^&]*)/);return m?decodeURIComponent(m[1]):"";}catch(e){return "";}})();
  function csRouteByMode(){
    var mode=SITE.mode||"open";
    if(mode==="before") render("comingsoon");
    else if(mode==="closed") render("closed");
    else if(mode==="ended") render("ended");
    else render("input");
  }
  function csBoot(){
    renderLoading();
    csJsonp("status",{preview:PREVIEW},function(res){
      if(res){ SITE.mode=res.mode||"open"; SITE.openAt=res.openAt||""; if(res.texts)SITE.texts=res.texts; if(res.event)SITE.event=res.event; if(res.openAt)PUBLISH_DISP=res.openAt; }
      csRouteByMode();
    },function(){ render("input"); });
  }
  csBoot();
})();
</script>
</body>
</html>
